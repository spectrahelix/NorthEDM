name: Generate keystore (one-time)

# Creates an Android signing keystore so you don't need keytool/JDK locally.
# Run this ONCE. Download the artifact, save the keystore somewhere safe
# (losing it = you can't ship app updates ever again), copy the four values
# into repo Secrets, then delete the artifact.
on:
  workflow_dispatch:
    inputs:
      alias:
        description: "Key alias"
        default: "northedm"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Generate keystore + credentials
        run: |
          ALIAS="${{ github.event.inputs.alias }}"
          PW="$(openssl rand -base64 30 | tr -dc 'A-Za-z0-9' | head -c 28)"
          keytool -genkeypair -v \
            -keystore northedm.keystore \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PW" -keypass "$PW" \
            -dname "CN=NorthEDM, O=NorthEDM, C=US"
          {
            echo "===== NorthEDM Android signing — SAVE ALL OF THIS ====="
            echo
            echo "Add these 4 as repo Secrets (Settings -> Secrets and variables -> Actions):"
            echo
            echo "ANDROID_KEY_ALIAS=$ALIAS"
            echo "ANDROID_KEYSTORE_PASSWORD=$PW"
            echo "ANDROID_KEY_PASSWORD=$PW"
            echo
            echo "ANDROID_KEYSTORE_B64 (single line, paste the whole thing):"
            base64 -w0 northedm.keystore
            echo
          } > keystore-credentials.txt
          echo "Keystore generated. Credentials written to artifact (not shown in logs)."
      - name: Upload keystore + credentials (KEEP SAFE, then delete this artifact)
        uses: actions/upload-artifact@v4
        with:
          name: northedm-keystore-SAVE-THIS
          path: |
            northedm.keystore
            keystore-credentials.txt
          retention-days: 1
